// VERSION 260405
// Default settings are defined here.
// Do not edit this file directly. Use "yt-dlp.ini" to customize.

[SWITCH]

stop=0
	// 0: Use yt-dlp (default)  /  1: Stop using yt-dlp

[COOKIE]

cookie_file=
//cookie_file=%APPDATA%\PotPlayerMini64\Extension\Media\PlayParse\cookies01.txt
	// Path to the cookie file you saved.
	// Needed to log in to your website account.
	// Collect cookies from logged-in sessions to make this file.
	// See: https://github.com/hgcat-360/PotPlayer-Extension_yt-dlp/wiki/Get-Cookies-and-Login#prepare-a-cookie-file-manually
	// Also see: https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp

cookie_browser=
//cookie_browser=firefox
	// Browser name to get cookies from automatically.
	// Ignored if 'cookie_file' is set.
	// Note: On Windows, only "firefox" works well.
	// To use a browser profile, add ":PROFILE" at the end.
	// To use a Firefox container, add "::CONTAINER" at the end.
	// See: https://github.com/hgcat-360/PotPlayer-Extension_yt-dlp/wiki/Get-Cookies-and-Login#automatically-extract-cookies

mark_watched=1
	// Adds watched videos to your account's "Watch history" when logged in.
	// 0: Off  /  1: On (default)

[YOUTUBE]

enable_youtube=1
	// Controls how YouTube URLs are handled.
	// If the built-in YouTube extension is listed above this yt-dlp extension, 
	// the built-in one will handle YouTube URLs.
	// If one extension skips a task, the next extension will try to handle it.
	// 0: Pass all YouTube URLs to the next extension
	// 1: Handle videos, pass playlists (default)
	// 2: Handle both videos and playlists
	// 3: Handle only playlists, pass videos
	// With setting 2 or 3, see 'website_playlist_xxx' in the [TARGET] section.
	// Some playlists may be treated differently from the built-in behavior.

youtube_live=0
	// Handles YouTube Live streams using yt-dlp.exe.
	// Works only when 'enable_youtube' is set to 1 or 2.
	// Set to 0 to use PotPlayer's built-in features instead.
	// For live chat, see the 'live_chat' setting in the [TARGET] section.
	// With PotPlayer's "Built-in HLS Source" filter, it may be possible 
	// to rewind the stream to a point before you started watching.
	// 0: Off (default)  /  1: On

base_lang=
	// Base language for menu labels.
	// Use an ISO 639 code or alias (such as "en", "pt", "fil", "iw", ...).
	// Some languages need a region or script subtag, 
	// such as "zh-CN", "zh-TW", "es-419", "pt-PT", "fr-CA", "sr-Latn".
	// Not all languages are supported for menu labels.
	// Leave blank for auto-detection (default).

auto_sub_lang=
//auto_sub_lang=hi, en, ta, te
	// Languages for auto-generated subtitles on YouTube.
	// If auto-generated subtitles exist for these languages, 
	// they are added as options to the subtitle menu in PotPlayer.
	// Use ISO 639 codes or aliases. Separate multiple codes with commas.
	// If a language code has multiple forms, all are matched 
	// (e.g. "zh" matches both "zh-Hans" and "zh-Hant").
	// Leave blank for auto-detection (default).
	// Note: YouTube may limit this auto-subtitle access after repeated use.

dubbed_filter=1
	// Filters auto-dubbed tracks, if they exist.
	// Helps slim down the menu and open streams faster in PotPlayer.
	// YouTube has two types of auto-dubbed tracks:
	// audio-only tracks, and video tracks with dubbed audio.
	// 0: Do not filter dubbed tracks
	// 1: Filter all dubbed tracks by 'auto_sub_lang' (default)
	// 2: Filter dubbed video tracks by the default language, keep audio-only

keep_tab_playlist=0
	// When importing YouTube channel tabs, keeps playlists as they are.
	// Applies to Featured (Home), Playlists, Releases, and Podcasts tabs.
	// You can expand a playlist later by double-clicking it twice quickly.
	// Set to 0 to expand all playlists from the start.
	// Works only when 'enable_youtube' is set to 2 or 3, and 
	// this extension is listed above the built-in YouTube extension.
	// 0: Off (default)  /  1: On

sponsor_block=
//sponsor_block=sponsor, interaction, selfpromo, music_offtopic
//sponsor_block=all, -poi_highlight
	// Adds SponsorBlock chapters to YouTube videos.
	// See: https://github.com/hgcat-360/PotPlayer-Extension_yt-dlp/wiki/SponsorBlock-on-YouTube
	// Also see: https://wiki.sponsor.ajay.app/w/Guidelines
	// Enter the categories you want. Available categories:
	// poi_highlight, sponsor, interaction, selfpromo, filler, hook, preview, 
	// intro, outro, music_offtopic, all. (From high to low priority)
	// Separate multiple categories with commas. Prefix "-" to exclude one.

player_client=default,mweb
	// Clients to extract video data from.
	// Separate multiple clients with commas.
	// See: https://github.com/yt-dlp/yt-dlp/blob/master/README.md#extractor-arguments

#po_token=
//po_token=web.gvs+XXX,web_safari.gvs+YYY
	// PO Token, used with cookies ('cookie_file' or 'cookie_browser').
	// Format: "CLIENT.CONTEXT+PO_TOKEN" (Assumed context: GVS)
	// If multiple tokens are needed, separate them with commas.
	// See: https://github.com/yt-dlp/yt-dlp/blob/master/README.md#extractor-arguments
	// See also: https://github.com/yt-dlp/yt-dlp/wiki/PO-Token-Guide
	// Leave blank if using a POT provider.

#potoken_bgutil_http=
//potoken_bgutil_http="base_url=http://127.0.0.1:8080"
	// For BgUtils POT Provider (Brainicism).
	// See: https://github.com/Brainicism/bgutil-ytdlp-pot-provider
	// Format: --extractor-args "youtubepot-bgutilhttp:XXXXX"
	// Needs cookies ('cookie_file' or 'cookie_browser').

#potoken_bgutil_script=
//potoken_bgutil_script="server_home=/path/to/bgutil-ytdlp-pot-provider/server"
	// For BgUtils POT Provider (Brainicism).
	// See: https://github.com/Brainicism/bgutil-ytdlp-pot-provider
	// Format: --extractor-args "youtubepot-bgutilscript:YYYYY"
	// Needs cookies ('cookie_file' or 'cookie_browser').

[TARGET]

website_playlist_standard=1
	// Controls how website playlists are handled, if supported.
	// Normally, playlists expand when added to the album in PotPlayer.
	// For YouTube playlists, works only if 'enable_youtube' is set to 2 or 3.
	// Some playlists may take a long time to collect item metadata, 
	// so adjust 'playlist_metadata_timeout' as needed.
	// 0: Do not expand at first
	// 1: expand if the URL is a pure playlist without a video ID (default)
	// 2: expand if the URL contains a playlist 
	// With setting 0, double-click a playlist twice to expand it.
	// With setting 2, the page may not look like a playlist.

website_playlist_each=youtube: 1, youtu.be: 1, bilibili.com: 2
	// Controls how website playlists are handled for each website.
	// Takes priority over 'website_playlist_standard'.
	// Format: "key: value," where key is a domain string in the URL, and 
	// value (0, 1, 2) has the same meaning as in 'website_playlist_standard'.

playlist_items_timeout=0
	// Reference time in seconds for collecting playlist items.
	// After this time, the process stops, so fewer items are shown.
	// For large playlists, processing speed is much slower if a timeout is set.
	// Set to 0 for no limit (default).

playlist_metadata_timeout=30
	// Reference time in seconds for collecting metadata of playlist items.
	// After this time, metadata collection stops and items are shown at once.
	// This timeout is not used when items load quickly on some websites.
	// Default is 30. Set to 0 for no limit. 

playlist_without_metadata=1
	// Shows items from website playlists even if their metadata has not 
	// been collected yet.
	// If 'playlist_metadata_timeout' is too short, 
	// many untitled items may appear in the album view.
	// 0: Off  /  1: On (default)

playlist_expand_mode=1
	// Controls where a website playlist expands when double-clicked twice.
	// Applies to playlists added to albums without being expanded.
	// 0: Bottom of the default album
	// 1: Bottom of the current album (default)
	// 2: Next to the current item
	// 10: Play queue in the new window
	// In an external-playlist album, setting 2 works the same as setting 1.

direct_file_info=1
	// Sets metadata for direct links to video, audio, or image files on the web.
	// (date and the server domain, with thumbnail from the file itself)
	// yt-dlp.exe is not used in this task.
	// Note: Detection of an actual file is not always accurate.
	// 0: Off  /  1: On (default)

m3u8_hls=1
	// Uses yt-dlp.exe for M3U8 URLs (*.m3u8) on the web.
	// If the content includes HLS tags, the URL is treated as an HLS stream.
	// Selectable quality formats are shown, if available.
	// If it is a pure playlist, it expands in the album view.
	// 0: Off  /  1: On (default)

live_chat=1
	// Handles live chat. Supports YouTube, Twitch, Kick, and Rumble.
	// It can be displayed with the [F9] key by default.
	// Using of live chat starts PotPlayer's internal Edge (WebView2).
	// If 'youtube_live' is set to 0, this setting is ignored for YouTube.
	// To join the chat on YouTube Live, log in to your account under:
	// [Preferences] > [Extension] > [Web Account]
	// 0: Off  /  1: On (default)

rss_playlist=1
	// Uses yt-dlp.exe for RSS feeds on the web, usually ending in ".xml".
	// When an RSS feed URL is opened, the listed items are extracted 
	// and imported into the album.
	// 0: Off  /  1: On (default)

radio_info=1
	// Collects metadata for online radio (station name, etc.).
	// Shoutcast and Icecast are supported.
	// This extension handles radio metadata directly without yt-dlp.exe.
	// Note: Dynamic song titles are shown by PotPlayer's built-in feature.
	// 0: Off  /  1: On (default)

radio_thumbnail=1
	// Shows thumbnail images for online radio in the album view.
	// The image files (yt-dlp_radio*.jpg) must be placed in the script folder.
	// 0: Off  /  1: On (default)

shoutcast_playlist=0
	// Handles Shoutcast playlists directly without expanding them.
	// (PLS, M3U, XSPF -- tunein-station files from http://yp.shoutcast.com/)
	// Gets station names and, if available, selectable server options.
	// yt-dlp.exe does not run with Shoutcast playlists.
	// If set to 0, expands server URLs when added to the album.
	// 0: Off (default)  /  1: On

[FORMAT]

reduce_formats=0
	// Reduces formats when many appear in the quality menu.
	// Helps slim down the menu and open streams faster in PotPlayer.
	// Setting 1 is useful on unlimited broadband.
	// 0: Do not reduce (default)
	// 1: Reduce low-quality
	// 2: Reduce high-quality
	// 3: Filter by resolution from SD to FullHD

remove_duplicate_quality=1
	// Hides formats with duplicate quality and type in the quality menu.
	// 0: Off  /  1: On (default)

twitch_live_vod=0
	// Tries to play live streams as VOD (Video on Demand) on Twitch.
	// Earlier chapters are shown, and ads may be removed.
	// With PotPlayer's "Built-in HLS Source" filter, it may be possible 
	// to rewind a live stream to the start.
	// If this fails, yt-dlp.exe will run again with normal handling.
	// 0: Off (default)  /  1: On

title_live_prefix="{LIVE} "
//title_live_prefix="[ON AIR] "
	// Text placed at the front of live stream titles.
	// Used for live streams by an individual channel / uploader.
	// Use double quotes to keep a space at the end.

title_channel_standard=1
	// Adds the channel / uploader name to the start of the title, if needed.
	// 0: Do not add
	// 1: Add for live streams only (default)
	// 2: Add for all content if available

title_channel_each=youtube: 0, youtu.be: 0, twitch: 2, kick: 2, facebook: 2
	// Adds the channel / uploader name to the title for each website.
	// Takes priority over 'title_channel_standard'.
	// Format: "key: value," where key is a domain string in the URL, and 
	// value (0, 1, 2) has the same meaning as in 'title_channel_standard'.

title_channel_separator=" - "
	// Text between author and title when 'title_channel_xxx' is used.
	// Use double quotes to keep spaces on either side.

title_alt_detail=1
	// Uses "alt_title" if it is more detailed than the default title.
	// 0: Off  /  1: On (default)

title_multi_lines=0
	// Keeps titles in multiple lines if they have line breaks.
	// Multi-line titles are easier to read in the tooltip.
	// 0: Off (default)  /  1: On

title_max_length=250
	// Maximum length of a stream title.
	// If the title is longer than this value, it will be cut off.
	// Set to 0 for no limit (Default: 250, Minimum allowed: 30).

[NETWORK]

cache_time_item=120
	// Cache lifetime for each stream, in minutes.
	// Once this extension collects URL links / metadata, it will not use 
	// yt-dlp.exe again for the same stream until this time has passed.
	// All caches are cleared on extension settings load or on PotPlayer exit.
	// If you get a playback error, try reloading the URL without cache.
	// To reload a URL without cache, double-click the item twice quickly.
	// Note: This does not include video / audio data itself.
	// Default: 120 minutes (recommended).
	// Set to 0 for no limit (not recommended).

cache_time_playlist=24
	// Cache lifetime for each playlist, in hours.
	// All caches are cleared on extension settings load or on PotPlayer exit.
	// Default: 24 hours. Set to 0 for no limit.

cache_cancel_time=3
	// Time in seconds to decide if the cache is kept after a cancel.
	// If you cancel loading a URL after waiting this long, the cache is 
	// still created in the background for later use.
	// Usually, caches are saved when URLs are opened successfully.
	// Range: 0–10 (default: 3 seconds).

proxy=
//proxy=socks5://user:pass@127.0.0.1:1080/
	// Proxy address for HTTP/HTTPS/SOCKS.

#socket_timeout=

#source_address=

#geo_verification_proxy=

#xff=

ip_version=0
	// IP version to use for all connections.
	// 0: Default
	// 4: IPv4
	// 6: IPv6

no_check_certificates=1
	// Disables HTTPS certificate checking.
	// Allows access even if the server certificate is expired.
	// 0: Off  /  1: On (default)

#impersonate=safari,chrome-146
	// Used when yt-dlp access is not allowed by Cloudflare anti-bot challenge.

referer=
	// Referer URL.
	// Used when yt-dlp access is not generally allowed.
	// Once access succeeds, PotPlayer stores the target domain and 
	// its referer as a pair.

[MAINTENANCE]

console_out=0
	// Shows a console window with messages and errors.
	// To close it, set this to 0 and restart PotPlayer.
	// Warning: While selecting text in the console, extensions stop working.
	// See: https://github.com/hgcat-360/PotPlayer-Extension_yt-dlp/wiki/Console-Log-Output-Notes
	// 0: Hide (default)
	// 1: Show main info
	// 2: Show detailed info
	// 3: Show all info with yt-dlp JSON and HTTP server data

ytdlp_location=
	// The folder path to place yt-dlp.exe in.
	// Enter the full folder path without environment variables.
	// If blank, PotPlayer's "Module" folder is used (default).

update_ytdlp=0
	// Updates yt-dlp.exe automatically if a newer version is found online.
	// If using a nightly build, the latest nightly version is downloaded.
	// May need admin rights for PotPlayer to replace yt-dlp.exe.
	// You can change the 'ytdlp_location' folder to get write permission.
	// 0: Do not update automatically (default)
	// 1: Auto update when using the yt-dlp extension
	// 2: Update once, next time you open the yt-dlp info panel in the settings

ytdlp_hash=
	// Hash value of yt-dlp.exe.
	// Do not delete this.

critical_error=0
	// If a critical error appears, check if your yt-dlp.exe is genuine.
	// If it is safe, set this setting to 0 and reload extensions.

